apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm-templates-demo.fullname" . }}-env
  labels:
    {{- include "helm-templates-demo.labels" . | nindent 4 }}
data:
  app.properties: |
    APP_NAME={{ include "helm-templates-demo.name" . }}
    RELEASE={{ .Release.Name }}
    ENVIRONMENT={{ default "dev" .Values.environment }}
